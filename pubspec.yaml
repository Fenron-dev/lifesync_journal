name: lifesync_journal
description: LifeSync Journal - Eine persönliche Lebensdokumentations-App mit Obsidian-Kompatibilität und Ende-zu-Ende-Verschlüsselung.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Navigation
  go_router: ^13.1.0
  
  # Database & Storage
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.2
  path: ^1.8.3
  file_picker: ^8.0.0
  
  # Encryption
  cryptography: ^2.7.0
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3
  
  # Markdown
  flutter_markdown: ^0.6.18+3
  markdown: ^7.1.1
  
  # YAML
  yaml: ^3.1.2
  yaml_writer: ^2.0.0
  
  # UI Components
  shadcn_ui: ^0.3.3
  fluent_ui: ^4.8.6
  macos_ui: ^2.0.8
  flutter_platform_widgets: ^7.0.0
  
  # Charts & Visualization
  fl_chart: ^0.66.0
  calendar_view: ^1.1.0
  
  # Animations
  flutter_animate: ^4.3.0
  animations: ^2.0.8
  
  # Media
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  video_player: ^2.8.2
  audioplayers: ^5.2.1
  
  # Location
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  
  # Notifications
  flutter_local_notifications: ^16.3.0
  timezone: ^0.9.2
  
  # Widgets
  home_widget: ^0.4.1
  flutter_slidable: ^3.0.1
  
  # Input
  pinput: ^4.0.0
  mask_text_input_formatter: ^2.9.0
  
  # Audio Recording
  record: ^6.2.0
  speech_to_text: ^6.5.1
  permission_handler: ^11.3.0
  
  # Export
  pdf: ^3.10.7
  printing: ^5.12.0
  # epubx: removed — incompatible with pdf (image v3 vs v4 conflict)
  
  # Utils
  shared_preferences: ^2.2.3
  qr_flutter: ^4.1.0
  uuid: ^4.3.1
  intl: ^0.20.0
  collection: ^1.18.0
  url_launcher: ^6.2.3
  share_plus: ^7.2.1
  package_info_plus: ^9.0.0
  
  # Weather
  weather: ^3.1.1
  
  # Health Integration (optional)
  health: ^12.0.0
  
  # JSON
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  isar_generator: ^3.1.0+1
  riverpod_generator: ^2.3.9
  json_serializable: ^6.7.1
  freezed: ^2.4.6
  # custom_lint + riverpod_lint: removed — analyzer version conflict with isar_generator ^3.1.0+1

# Erzwingt rive_common 0.4.15, das den -Werror Unused-Variable Fehler auf Linux behebt
dependency_overrides:
  rive_common: ^0.4.15

flutter:
  uses-material-design: true
  generate: true
  
  assets:
    - assets/images/
    - assets/fonts/
    - assets/sounds/
  
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500

# Isar schema generation
targets:
  $default:
    builders:
      isar_generator:
        options:
          unknown_enum_value: unknown
