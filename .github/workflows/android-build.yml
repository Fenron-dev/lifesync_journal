name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.41.4'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Disable Flutter analytics
        run: flutter config --no-analytics

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Analyze code
        run: flutter analyze --no-fatal-warnings

      - name: Build debug APK
        run: flutter build apk --debug --target-platform android-arm64

      - name: Upload debug APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: lifesync-journal-android-debug-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      # Release-Build nur bei Tags (v*)
      - name: Build release APK (unsigned)
        if: startsWith(github.ref, 'refs/tags/v')
        run: flutter build apk --release --target-platform android-arm64 --split-per-abi

      - name: Upload release APK as artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: lifesync-journal-android-release-${{ github.ref_name }}
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 90

  build-linux:
    name: Build Linux Desktop
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good gstreamer1.0-plugins-bad

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Disable Flutter analytics
        run: flutter config --no-analytics --enable-linux-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Linux (release)
        run: flutter build linux --release

      - name: Package Linux build
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ../../../../../lifesync-journal-linux-x64.tar.gz .

      - name: Upload Linux build as artifact
        uses: actions/upload-artifact@v4
        with:
          name: lifesync-journal-linux-x64-${{ github.sha }}
          path: lifesync-journal-linux-x64.tar.gz
          retention-days: 30

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: lifesync-journal-android-release-${{ github.ref_name }}
          path: release-assets/

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          pattern: lifesync-journal-linux-x64-*
          merge-multiple: true
          path: release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          body: |
            ## LifeSync Journal ${{ github.ref_name }}

            ### Downloads
            | Plattform | Datei |
            |-----------|-------|
            | Android (ARM64) | `app-arm64-v8a-release.apk` |
            | Linux (x64) | `lifesync-journal-linux-x64.tar.gz` |

            ### Android Installation
            1. APK herunterladen
            2. Einstellungen → Sicherheit → "Unbekannte Quellen" aktivieren
            3. APK installieren

            ### Linux Installation
            ```bash
            tar -xzf lifesync-journal-linux-x64.tar.gz
            ./lifesync_journal
            ```

            ### Änderungen
            Siehe [Commits](${{ github.server_url }}/${{ github.repository }}/commits/${{ github.ref_name }})
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
