name: Android Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Analyze code
        run: flutter analyze --no-fatal-warnings

      - name: Build debug APK
        run: flutter build apk --debug --target-platform android-arm64

      - name: Upload debug APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: lifesync-journal-debug-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      # Release-Build nur bei Tags (v*)
      - name: Build release APK (unsigned)
        if: startsWith(github.ref, 'refs/tags/v')
        run: flutter build apk --release --target-platform android-arm64 --split-per-abi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          body: |
            ## LifeSync Journal ${{ github.ref_name }}

            ### Installation
            1. APK herunterladen
            2. Auf Android: Einstellungen → Sicherheit → "Unbekannte Quellen" aktivieren
            3. APK installieren

            ### Änderungen
            Siehe [Commits](${{ github.server_url }}/${{ github.repository }}/commits/${{ github.ref_name }})
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
